<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    width:350px;
}

img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    border:4px solid #4facfe;
}

h1{
    margin:0;
    color:#333;
}

p{
    color:#666;
    margin:10px 0 25px;
}

button{
    background:#4facfe;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#2f8df5;
}
</style>
</head>

<body>

<div class="card">
    <img id="foto" src="">
    <h1 id="nome">Carregando...</h1>
    <p id="email"></p>

    <button onclick="logout()">Sair</button>
</div>

<script>
const token = new URLSearchParams(location.search).get("token");

fetch("/user/profile", {
    headers:{
        Authorization: token
    }
})
.then(res => res.json())
.then(user => {
    document.getElementById("foto").src = user.photo;
    document.getElementById("nome").innerText = user.name;
    document.getElementById("email").innerText = user.email;
});

function logout(){
    window.location.href="/";
}
</script>

</body>
</html>
